<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDisplay Gallery</title>

    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .gallery img {
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,255,255,.25);
            transition: .2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>Galeria</h1>

<div class="gallery">

    <img src="https://raw.githubusercontent.com/LucasDESlGN/webdisplay-files/refs/heads/main/tv-woman-retro-3840x2160-13719.jpg">

</div>

</body>
</html>
